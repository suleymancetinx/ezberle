<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezber Programı</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        primary: '#4edea3',
        'primary-dim': '#10b981',
        'on-primary': '#003824',
        surface: '#0f0f0f',
        'surface-card': '#1a1a1a',
        'surface-high': '#242424',
        'surface-highest': '#2e2e2e',
        'on-surface': '#e5e2e1',
        'on-surface-dim': '#8a8a8a',
        border: 'rgba(255,255,255,0.08)',
      },
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      borderRadius: { '2xl': '1rem', '3xl': '1.5rem', '4xl': '2rem' },
    }
  }
}
</script>
<style>
  body { background: #0a0a0a; font-family: 'Inter', sans-serif; overflow-x: hidden; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; user-select: none; }
  .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
  .glass-strong { background: rgba(255,255,255,0.07); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.12); }
  #drawer { transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
  #drawer.open { transform: translateX(0); }
  #overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  #overlay.open { opacity: 1; pointer-events: auto; }
  .active-glow { border-color: rgba(78,222,163,0.5) !important; box-shadow: 0 0 20px rgba(78,222,163,0.15); }
  @keyframes pulse-glow { 0%,100%{box-shadow:0 0 20px rgba(78,222,163,0.15)} 50%{box-shadow:0 0 40px rgba(78,222,163,0.35)} }
  .playing-pulse { animation: pulse-glow 2.5s ease-in-out infinite; }
  @keyframes eq1 { 0%,100%{height:6px} 50%{height:18px} }
  @keyframes eq2 { 0%,100%{height:14px} 50%{height:6px} }
  @keyframes eq3 { 0%,100%{height:10px} 50%{height:20px} }
  .eq-bar:nth-child(1) { animation: eq1 0.8s ease-in-out infinite; }
  .eq-bar:nth-child(2) { animation: eq2 0.6s ease-in-out infinite 0.1s; }
  .eq-bar:nth-child(3) { animation: eq3 0.9s ease-in-out infinite 0.2s; }
  .log-item { transition: all 0.25s ease; }
  .log-item.active { background: rgba(78,222,163,0.08); border-color: rgba(78,222,163,0.3); }
  .log-item.done { opacity: 0.45; }
  input[type=range] { -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.1); border-radius: 9999px; height: 4px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #4edea3; cursor: pointer; border: 2px solid #0a0a0a; }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  select option { background: #1a1a1a; color: #e5e2e1; }
  .ctrl-btn { display:flex; align-items:center; justify-content:center; border-radius:9999px; transition: all 0.15s; cursor:pointer; border:none; outline:none; }
  .ctrl-btn:active:not(:disabled) { transform: scale(0.9); }
  .ctrl-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .progress-fill { transition: width 0.35s ease; }
  @media (max-width: 640px) { .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); } }
</style>
</head>
<body class="dark text-on-surface selection:bg-primary/20">

<!-- ── Overlay ── -->
<div class="fixed inset-0 bg-black/60 z-50 backdrop-blur-sm" id="overlay"></div>

<!-- ── Drawer ── -->
<aside id="drawer" class="fixed inset-y-0 left-0 z-[60] w-[320px] glass-strong flex flex-col rounded-r-3xl shadow-2xl overflow-y-auto">
  <div class="flex items-center justify-between p-6 pb-4 border-b border-white/[0.08]">
    <h2 class="text-primary font-bold text-lg">Ezber Ayarları</h2>
    <button id="closeDrawer" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 text-on-surface-dim hover:text-white transition-colors">
      <span class="material-symbols-outlined text-[20px]">close</span>
    </button>
  </div>
  <div class="flex flex-col gap-5 p-6">
    <!-- Sure -->
    <div class="flex flex-col gap-2">
      <label class="text-[11px] font-semibold uppercase tracking-widest text-on-surface-dim">Sure</label>
      <select id="suraSelect" class="w-full glass rounded-xl px-4 py-3 text-on-surface text-sm focus:outline-none focus:ring-1 focus:ring-primary/50 bg-transparent"></select>
    </div>
    <!-- Ayet -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-semibold uppercase tracking-widest text-on-surface-dim">Başlangıç</label>
        <input id="startAyah" type="number" min="1" value="1" class="glass rounded-xl px-4 py-3 text-on-surface text-sm focus:outline-none focus:ring-1 focus:ring-primary/50 bg-transparent w-full">
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-semibold uppercase tracking-widest text-on-surface-dim">Bitiş</label>
        <input id="endAyah" type="number" min="1" value="3" class="glass rounded-xl px-4 py-3 text-on-surface text-sm focus:outline-none focus:ring-1 focus:ring-primary/50 bg-transparent w-full">
      </div>
    </div>
    <!-- Tekrar -->
    <div class="flex flex-col gap-3">
      <div class="flex justify-between items-center">
        <label class="text-[11px] font-semibold uppercase tracking-widest text-on-surface-dim">Tekrar Sayısı</label>
        <span id="repsValue" class="text-primary font-bold text-lg">3</span>
      </div>
      <input id="reps" type="range" min="2" max="10" value="3" class="w-full accent-primary">
    </div>
    <!-- Kari -->
    <div class="glass rounded-xl px-4 py-3 flex items-center gap-3">
      <span class="material-symbols-outlined text-primary text-xl">record_voice_over</span>
      <div>
        <p class="text-[10px] text-on-surface-dim uppercase tracking-widest">Kari</p>
        <p class="text-sm font-medium text-on-surface">İshak Demirci</p>
      </div>
    </div>
    <!-- Uygula -->
    <button id="btnApply" class="w-full py-3.5 bg-primary text-on-primary font-bold rounded-2xl active:scale-95 transition-all text-sm tracking-wide">
      Uygula ve Başlat
    </button>
    <!-- Sıfırla -->
    <button id="btnReset" class="w-full py-3 rounded-2xl border border-white/10 text-on-surface-dim hover:text-red-400 hover:border-red-400/30 transition-colors text-sm font-medium">
      Sıfırla
    </button>
  </div>
  <!-- Son konum -->
  <div class="mt-auto p-6 pt-0">
    <div class="glass rounded-xl p-4 flex items-center gap-3">
      <span class="material-symbols-outlined text-primary/60 text-xl">history</span>
      <div>
        <p class="text-[10px] text-on-surface-dim uppercase tracking-widest">Son Konum</p>
        <p class="text-sm font-medium text-on-surface" id="lastPosLabel">—</p>
      </div>
      <button id="btnResume" class="ml-auto text-[11px] font-semibold text-primary bg-primary/10 px-3 py-1.5 rounded-full hover:bg-primary/20 transition-colors hidden">Devam</button>
    </div>
  </div>
</aside>

<!-- ── Header ── -->
<header class="fixed top-0 w-full z-40 glass border-b border-white/[0.07] flex items-center justify-between px-4 sm:px-6 h-14">
  <div class="flex items-center gap-3">
    <button id="openDrawer" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors active:scale-95">
      <span class="material-symbols-outlined text-primary text-[22px]">menu</span>
    </button>
    <h1 class="text-primary font-extrabold text-xl tracking-tight">Ezber Programı</h1>
  </div>
  <div class="flex items-center gap-2">
    <div class="hidden sm:flex items-center gap-1.5 glass rounded-full px-3 py-1.5">
      <span class="material-symbols-outlined text-primary/60 text-[16px]">schedule</span>
      <span class="text-[11px] font-semibold text-on-surface-dim" id="totalDurHeader">—</span>
    </div>
  </div>
</header>

<!-- ── Main ── -->
<main class="pt-14 pb-24 sm:pb-8 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 py-6 flex flex-col gap-5">

    <!-- Hero Player Card -->
    <div class="glass-strong rounded-3xl p-6 flex flex-col items-center gap-5 relative overflow-hidden" id="npCard">
      <!-- ambient glow -->
      <div class="absolute -top-16 -right-16 w-48 h-48 bg-primary/10 blur-[80px] rounded-full pointer-events-none"></div>
      <div class="absolute -bottom-16 -left-16 w-48 h-48 bg-primary/5 blur-[80px] rounded-full pointer-events-none"></div>

      <!-- Art + Status -->
      <div class="relative" id="artWrap">
        <div class="w-36 h-36 sm:w-44 sm:h-44 rounded-3xl glass flex items-center justify-center overflow-hidden border-2 border-white/10 transition-all duration-700" id="artContainer">
          <span class="material-symbols-outlined text-primary/30" style="font-size:72px">menu_book</span>
        </div>
        <!-- EQ bars overlay -->
        <div id="eqOverlay" class="absolute inset-0 flex items-end justify-center gap-1 pb-4 pointer-events-none opacity-0 transition-opacity duration-300">
          <div class="eq-bar w-1.5 bg-primary rounded-full" style="height:6px"></div>
          <div class="eq-bar w-1.5 bg-primary rounded-full" style="height:14px"></div>
          <div class="eq-bar w-1.5 bg-primary rounded-full" style="height:10px"></div>
        </div>
        <!-- Status dot -->
        <div id="statusBadge" class="absolute -top-2 -right-2 flex items-center gap-1.5 glass rounded-full px-2.5 py-1">
          <div id="statusDot" class="w-2 h-2 rounded-full bg-white/20"></div>
          <span id="statusText" class="text-[10px] font-semibold text-on-surface-dim uppercase tracking-wider">Bekliyor</span>
        </div>
      </div>

      <!-- Info -->
      <div class="text-center space-y-1">
        <h2 class="font-bold text-xl sm:text-2xl text-white" id="npMain">— · —</h2>
        <p class="text-primary/80 text-sm font-medium" id="npDetail">Ayarları açıp sure ve ayet seçin</p>
        <div id="npBadges" class="flex items-center justify-center gap-2 pt-1" style="display:none!important">
          <span id="badgeRep" class="text-[11px] font-semibold px-3 py-1 rounded-full bg-primary/10 text-primary border border-primary/20"></span>
          <span id="badgePos" class="text-[11px] font-semibold px-3 py-1 rounded-full bg-white/5 text-on-surface-dim border border-white/10"></span>
        </div>
      </div>

      <!-- Progress -->
      <div class="w-full space-y-2">
        <div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
          <div id="progressFill" class="progress-fill h-full bg-primary rounded-full" style="width:0%"></div>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-[10px] text-on-surface-dim font-mono" id="progressLabel">0 / 0</span>
          <span class="text-[10px] text-on-surface-dim font-mono flex items-center gap-1">
            <span class="material-symbols-outlined" style="font-size:12px">schedule</span>
            <span id="totalDuration">—</span>
          </span>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center gap-3 sm:gap-4">
        <!-- Başa dön -->
        <button id="btnFirst" class="ctrl-btn w-9 h-9 bg-white/5 text-on-surface-dim hover:bg-white/10 hover:text-white" disabled title="Başa dön">
          <span class="material-symbols-outlined text-[18px]">first_page</span>
        </button>
        <!-- Önceki -->
        <button id="btnPrev" class="ctrl-btn w-11 h-11 bg-white/5 text-on-surface-dim hover:bg-white/10 hover:text-white" disabled title="Önceki">
          <span class="material-symbols-outlined text-[22px]">skip_previous</span>
        </button>
        <!-- Oynat/Duraklat -->
        <button id="btnPlay" class="ctrl-btn w-16 h-16 bg-primary text-on-primary shadow-xl shadow-primary/30 hover:bg-primary/90" title="Oynat">
          <span class="material-symbols-outlined text-[36px]" id="playIcon">play_arrow</span>
        </button>
        <!-- Sonraki -->
        <button id="btnNext" class="ctrl-btn w-11 h-11 bg-white/5 text-on-surface-dim hover:bg-white/10 hover:text-white" disabled title="Sonraki">
          <span class="material-symbols-outlined text-[22px]">skip_next</span>
        </button>
        <!-- Sona git -->
        <button id="btnLast" class="ctrl-btn w-9 h-9 bg-white/5 text-on-surface-dim hover:bg-white/10 hover:text-white" disabled title="Sona git">
          <span class="material-symbols-outlined text-[18px]">last_page</span>
        </button>
      </div>

      <!-- Secondary controls -->
      <div class="flex items-center justify-between w-full pt-1 border-t border-white/[0.06]">
        <button id="btnRebuild" class="text-[11px] text-on-surface-dim hover:text-primary transition-colors flex items-center gap-1 py-1 px-2 rounded-lg hover:bg-white/5">
          <span class="material-symbols-outlined text-[14px]">refresh</span>Kuyruğu Yenile
        </button>
        <button id="btnResetCtrl" class="text-[11px] text-on-surface-dim hover:text-red-400 transition-colors flex items-center gap-1 py-1 px-2 rounded-lg hover:bg-red-500/5">
          <span class="material-symbols-outlined text-[14px]">stop_circle</span>Sıfırla
        </button>
      </div>
    </div>

    <!-- Queue Card -->
    <div class="glass rounded-2xl overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-white/[0.06]">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary/60 text-[18px]">queue_music</span>
          <h3 class="text-sm font-semibold text-on-surface">Çalma Kuyruğu</h3>
        </div>
        <span id="logCount" class="text-[11px] text-on-surface-dim font-medium glass rounded-full px-2.5 py-0.5">—</span>
      </div>
      <div id="logBody" class="max-h-[280px] overflow-y-auto divide-y divide-white/[0.04]">
        <div class="px-5 py-8 text-center text-sm text-on-surface-dim">
          <span class="material-symbols-outlined text-white/10 block mb-2" style="font-size:36px">queue_music</span>
          Kuyruk henüz oluşturulmadı.
        </div>
      </div>
    </div>

  </div>
</main>

<!-- ── Bottom Nav (mobile) ── -->
<nav class="sm:hidden fixed bottom-0 left-0 w-full z-40 glass border-t border-white/[0.07] flex justify-around items-center px-2 py-2 pb-safe rounded-t-2xl">
  <div class="flex flex-col items-center gap-0.5 px-4 py-1.5 rounded-xl bg-primary/10">
    <span class="material-symbols-outlined text-primary text-[22px]">auto_stories</span>
    <span class="text-[10px] text-primary font-semibold">Ezber</span>
  </div>
  <button onclick="document.getElementById('openDrawer').click()" class="flex flex-col items-center gap-0.5 px-4 py-1.5 rounded-xl hover:bg-white/5 transition-colors">
    <span class="material-symbols-outlined text-on-surface-dim text-[22px]">tune</span>
    <span class="text-[10px] text-on-surface-dim">Ayarlar</span>
  </button>
  <div class="flex flex-col items-center gap-0.5 px-4 py-1.5 rounded-xl">
    <span class="material-symbols-outlined text-on-surface-dim text-[22px]">schedule</span>
    <span class="text-[10px] text-on-surface-dim font-mono" id="totalDurNav">—</span>
  </div>
</nav>

<script>
// ── Surah Data ──
const SURAH_DATA = [
  [1,"Fatiha",7],[2,"Bakara",286],[3,"Ali İmran",200],[4,"Nisa",176],
  [5,"Maide",120],[6,"Enam",165],[7,"Araf",206],[8,"Enfal",75],
  [9,"Tevbe",129],[10,"Yunus",109],[11,"Hud",123],[12,"Yusuf",111],
  [13,"Rad",43],[14,"İbrahim",52],[15,"Hicr",99],[16,"Nahl",128],
  [17,"İsra",111],[18,"Kehf",110],[19,"Meryem",98],[20,"Taha",135],
  [21,"Enbiya",112],[22,"Hac",78],[23,"Mü'minun",118],[24,"Nur",64],
  [25,"Furkan",77],[26,"Şuara",227],[27,"Neml",93],[28,"Kasas",88],
  [29,"Ankebut",69],[30,"Rum",60],[31,"Lokman",34],[32,"Secde",30],
  [33,"Ahzab",73],[34,"Sebe",54],[35,"Fatır",45],[36,"Yasin",83],
  [37,"Saffat",182],[38,"Sad",88],[39,"Zümer",75],[40,"Mümin",85],
  [41,"Fussilet",54],[42,"Şura",53],[43,"Zuhruf",89],[44,"Duhan",59],
  [45,"Casiye",37],[46,"Ahkaf",35],[47,"Muhammed",38],[48,"Fetih",29],
  [49,"Hucurat",18],[50,"Kaf",45],[51,"Zariyat",60],[52,"Tur",49],
  [53,"Necm",62],[54,"Kamer",55],[55,"Rahman",78],[56,"Vakıa",96],
  [57,"Hadid",29],[58,"Mücadele",22],[59,"Haşr",24],[60,"Mümtehine",13],
  [61,"Saf",14],[62,"Cuma",11],[63,"Münafikun",11],[64,"Tegabun",18],
  [65,"Talak",12],[66,"Tahrim",12],[67,"Mülk",30],[68,"Kalem",52],
  [69,"Hakka",52],[70,"Mearic",44],[71,"Nuh",28],[72,"Cin",28],
  [73,"Müzzemmil",20],[74,"Müddessir",56],[75,"Kıyame",40],[76,"İnsan",31],
  [77,"Mürselat",50],[78,"Nebe",40],[79,"Naziat",46],[80,"Abese",42],
  [81,"Tekvir",29],[82,"İnfitar",19],[83,"Mutaffifin",36],[84,"İnşikak",25],
  [85,"Buruc",22],[86,"Tarık",17],[87,"Ala",19],[88,"Gaşiye",26],
  [89,"Fecr",30],[90,"Beled",20],[91,"Şems",15],[92,"Leyl",21],
  [93,"Duha",11],[94,"İnşirah",8],[95,"Tin",8],[96,"Alak",19],
  [97,"Kadir",5],[98,"Beyyine",8],[99,"Zilzal",8],[100,"Adiyat",11],
  [101,"Karia",11],[102,"Tekasür",8],[103,"Asr",3],[104,"Hümeze",9],
  [105,"Fil",5],[106,"Kureyş",4],[107,"Maun",7],[108,"Kevser",3],
  [109,"Kafirun",6],[110,"Nasr",3],[111,"Mesed",5],[112,"İhlas",4],
  [113,"Felak",5],[114,"Nas",6]
];

const BASE = 'https://webdosya.diyanet.gov.tr/kuran/kuranikerim/Sound/ar_ishakdemir/';

// ── Populate select ──
const sel = document.getElementById('suraSelect');
SURAH_DATA.forEach(([num, name, verses]) => {
  const o = document.createElement('option');
  o.value = num;
  o.textContent = `${num}. ${name} (${verses} ayet)`;
  sel.appendChild(o);
});

// ── Drawer ──
const drawer = document.getElementById('drawer');
const overlay = document.getElementById('overlay');
document.getElementById('openDrawer').onclick = toggleDrawer;
document.getElementById('closeDrawer').onclick = toggleDrawer;
overlay.onclick = toggleDrawer;
function toggleDrawer() { drawer.classList.toggle('open'); overlay.classList.toggle('open'); }

// ── Range label ──
const repsEl = document.getElementById('reps');
const repsVal = document.getElementById('repsValue');
repsEl.oninput = () => { repsVal.textContent = repsEl.value; };

// ── LocalStorage persistence ──
const LS = {
  save(key, val) { try { localStorage.setItem('ezber_' + key, JSON.stringify(val)); } catch(e){} },
  load(key, def) { try { const v = localStorage.getItem('ezber_' + key); return v !== null ? JSON.parse(v) : def; } catch(e){ return def; } }
};

function saveSettings() {
  LS.save('sura', sel.value);
  LS.save('start', document.getElementById('startAyah').value);
  LS.save('end', document.getElementById('endAyah').value);
  LS.save('reps', repsEl.value);
}

function savePosition(pos) {
  if (!queue.length || pos < 0) return;
  const item = queue[pos];
  LS.save('lastPos', { sura: item.sura, suraName: item.suraName, ayah: item.ayah, rep: item.rep, qPos: pos });
}

function loadSettings() {
  sel.value = LS.load('sura', '1');
  document.getElementById('startAyah').value = LS.load('start', '1');
  document.getElementById('endAyah').value = LS.load('end', '3');
  repsEl.value = LS.load('reps', '3');
  repsVal.textContent = repsEl.value;
  refreshSuraMax();
  loadLastPos();
}

function loadLastPos() {
  const lp = LS.load('lastPos', null);
  const label = document.getElementById('lastPosLabel');
  const btn = document.getElementById('btnResume');
  if (lp) {
    label.textContent = `${lp.suraName} · ${lp.ayah}. Ayet (${lp.rep}. tekrar)`;
    btn.classList.remove('hidden');
  } else {
    label.textContent = '—';
    btn.classList.add('hidden');
  }
}

document.getElementById('btnResume').onclick = () => {
  const lp = LS.load('lastPos', null);
  if (!lp) return;
  // Restore settings to match saved sura
  sel.value = lp.sura;
  refreshSuraMax();
  toggleDrawer();
  const q = buildQueue();
  renderLog();
  const resumePos = Math.min(lp.qPos, q.length - 1);
  qPos = resumePos;
  runFrom(resumePos);
};

// ── State ──
let queue = [], qPos = 0, isPlaying = false, isPaused = false, stopFlag = false, audio = null, resolvePlay = null;

// ── Elements ──
const npCard = document.getElementById('npCard');
const npMain = document.getElementById('npMain');
const npDetail = document.getElementById('npDetail');
const npBadges = document.getElementById('npBadges');
const badgeRep = document.getElementById('badgeRep');
const badgePos = document.getElementById('badgePos');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const logBody = document.getElementById('logBody');
const logCount = document.getElementById('logCount');
const eqOverlay = document.getElementById('eqOverlay');
const artContainer = document.getElementById('artContainer');
const btnPlay = document.getElementById('btnPlay');
const playIcon = document.getElementById('playIcon');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnFirst = document.getElementById('btnFirst');
const btnLast = document.getElementById('btnLast');

function getSuraName(num) { const s = SURAH_DATA.find(x => x[0] === num); return s ? s[1] : `${num}. Sure`; }

function refreshSuraMax() {
  const sura = parseInt(sel.value);
  const s = SURAH_DATA.find(x => x[0] === sura);
  if (s) {
    document.getElementById('endAyah').max = s[2];
    document.getElementById('startAyah').max = s[2];
  }
}

sel.onchange = refreshSuraMax;

function buildQueue() {
  const sura = parseInt(sel.value);
  let start = parseInt(document.getElementById('startAyah').value) || 1;
  let end = parseInt(document.getElementById('endAyah').value) || 1;
  const reps = Math.min(10, Math.max(2, parseInt(repsEl.value) || 3));
  const suraInfo = SURAH_DATA.find(x => x[0] === sura);
  const maxV = suraInfo ? suraInfo[2] : 999;
  start = Math.max(1, Math.min(start, maxV));
  end = Math.max(start, Math.min(end, maxV));
  document.getElementById('startAyah').value = start;
  document.getElementById('endAyah').value = end;
  queue = [];
  for (let pivot = start; pivot <= end; pivot++) {
    for (let r = 0; r < reps; r++) {
      for (let a = start; a <= pivot; a++) {
        queue.push({ sura, ayah: a, rep: r + 1, totalReps: reps, pivot, suraName: getSuraName(sura) });
      }
    }
  }
  return queue;
}

function fmtDuration(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  return [h, m, s].map(v => String(v).padStart(2,'0')).join(':');
}

function updateTotalDuration(perAyet) {
  const avg = perAyet || 8;
  const total = queue.length * avg + Math.max(0, queue.length - 1) * 1.5;
  const str = fmtDuration(total);
  document.getElementById('totalDuration').textContent = str;
  document.getElementById('totalDurHeader').textContent = str;
  document.getElementById('totalDurNav').textContent = str;
}

function getGroups() {
  const groups = []; let cur = null;
  queue.forEach((item, i) => {
    const key = `${item.pivot}-${item.rep}`;
    if (!cur || cur.key !== key) { cur = { key, pivot: item.pivot, rep: item.rep, totalReps: item.totalReps, startIdx: i, endIdx: i, sura: item.sura, suraName: item.suraName }; groups.push(cur); }
    else { cur.endIdx = i; }
  });
  return groups;
}

function renderLog() {
  updateTotalDuration();
  if (!queue.length) {
    logBody.innerHTML = '<div class="px-5 py-8 text-center text-sm text-on-surface-dim"><span class="material-symbols-outlined text-white/10 block mb-2" style="font-size:36px">queue_music</span>Kuyruk henüz oluşturulmadı.</div>';
    logCount.textContent = '—'; return;
  }
  const groups = getGroups();
  logCount.textContent = `${groups.length} grup · ${queue.length} ses`;
  logBody.innerHTML = groups.map((g, gi) => {
    const s = queue[g.startIdx].ayah;
    const e = queue[g.endIdx].ayah;
    const range = s === e ? `${s}. Ayet` : `${s}–${e}. Ayet`;
    return `<div class="log-item flex items-center gap-3 px-5 py-3 border border-transparent" id="grp${gi}">
      <span class="w-5 text-right text-[11px] text-on-surface-dim font-mono flex-shrink-0">${gi+1}</span>
      <div class="w-1.5 h-1.5 rounded-full bg-white/15 flex-shrink-0" id="dot${gi}"></div>
      <span class="flex-1 text-sm text-on-surface/70">${g.suraName} · ${range}</span>
      <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-white/5 text-on-surface-dim">${g.rep}/${g.totalReps}</span>
    </div>`;
  }).join('');
}

function getGroupForPos(pos) {
  const groups = getGroups();
  for (let i = 0; i < groups.length; i++) { if (pos >= groups[i].startIdx && pos <= groups[i].endIdx) return i; }
  return -1;
}

function updateLog(pos) {
  const gi = getGroupForPos(pos);
  document.querySelectorAll('.log-item').forEach((el, i) => {
    el.classList.remove('active','done');
    const dot = document.getElementById('dot' + i);
    if (i < gi) { el.classList.add('done'); if(dot) dot.style.background='rgba(78,222,163,0.5)'; }
    else if (i === gi) {
      el.classList.add('active');
      if(dot) { dot.style.background='#4edea3'; dot.style.boxShadow='0 0 6px #4edea3'; }
      el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    } else { if(dot) { dot.style.background=''; dot.style.boxShadow=''; } }
  });
}

function updateNP(item, pos) {
  npCard.classList.add('playing-pulse');
  artContainer.classList.add('active-glow');
  eqOverlay.style.opacity = '1';
  document.getElementById('statusDot').style.cssText = 'background:#4edea3; box-shadow: 0 0 8px #4edea3;';
  document.getElementById('statusText').textContent = 'Çalıyor';
  npMain.textContent = `${item.suraName}  ·  ${item.ayah}. Ayet`;
  const groups = getGroups();
  const gi = getGroupForPos(pos);
  if (gi >= 0) {
    const g = groups[gi];
    const ayetler = queue.slice(g.startIdx, g.endIdx + 1).map(x => x.ayah);
    npDetail.textContent = `${item.rep}. tekrar — Grup: ${item.sura}:${ayetler.join(', ')}`;
  }
  npBadges.style.cssText = 'display:flex!important';
  badgeRep.textContent = `${item.rep}. tekrar / ${item.totalReps}`;
  badgePos.textContent = `${pos + 1} / ${queue.length}`;
  const pct = queue.length > 1 ? Math.round((pos / (queue.length - 1)) * 100) : 100;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${pos + 1} / ${queue.length}`;
  setNavButtons();
  savePosition(pos);
}

function setIdle(msg = 'Bekliyor') {
  npCard.classList.remove('playing-pulse');
  artContainer.classList.remove('active-glow');
  eqOverlay.style.opacity = '0';
  document.getElementById('statusDot').style.cssText = msg === 'Tamamlandı' ? 'background:#4edea3' : '';
  document.getElementById('statusText').textContent = msg;
  if (msg !== 'Tamamlandı') {
    npMain.textContent = '— · —';
    npDetail.textContent = 'Ayarları açıp sure ve ayet seçin';
    npBadges.style.cssText = 'display:none!important';
    progressFill.style.width = '0%';
    progressLabel.textContent = '0 / 0';
  } else {
    progressFill.style.width = '100%';
  }
}

function setNavButtons() {
  btnFirst.disabled = qPos === 0 || !queue.length;
  btnPrev.disabled = qPos === 0 || !queue.length;
  btnNext.disabled = qPos >= queue.length - 1 || !queue.length;
  btnLast.disabled = qPos >= queue.length - 1 || !queue.length;
}

function showPlayIcon(playing) {
  playIcon.textContent = playing ? 'pause' : 'play_arrow';
}

function playFile(url) {
  return new Promise(resolve => {
    if (audio) { audio.pause(); audio.src = ''; }
    audio = new Audio(url);
    resolvePlay = resolve;
    audio.onended = () => resolve('ended');
    audio.onerror = () => resolve('error');
    audio.onloadedmetadata = () => {
      if (audio.duration && !isNaN(audio.duration)) {
        const remaining = queue.length - qPos;
        const totalEst = qPos * (audio.duration + 1.5) + remaining * audio.duration + Math.max(0, remaining - 1) * 1.5;
        updateTotalDuration(audio.duration);
      }
    };
    audio.play().catch(() => resolve('error'));
  });
}

function delay(ms) {
  return new Promise(resolve => {
    const start = Date.now();
    const id = setInterval(() => {
      if (stopFlag) { clearInterval(id); resolve('stop'); }
      else if (Date.now() - start >= ms) { clearInterval(id); resolve('ok'); }
    }, 50);
  });
}

async function runFrom(startPos) {
  isPlaying = true; stopFlag = false;
  showPlayIcon(true);
  for (let i = startPos; i < queue.length; i++) {
    if (stopFlag) break;
    qPos = i;
    updateNP(queue[i], i);
    updateLog(i);
    while (isPaused) { await new Promise(r => setTimeout(r, 80)); if (stopFlag) break; }
    if (stopFlag) break;
    const res = await playFile(`${BASE}${queue[i].sura}_${queue[i].ayah}.mp3`);
    if (stopFlag || res === 'stop') break;
    if (i < queue.length - 1) { const d = await delay(1500); if (stopFlag || d === 'stop') break; }
  }
  if (!stopFlag) {
    isPlaying = false; isPaused = false;
    showPlayIcon(false);
    setIdle('Tamamlandı');
    setNavButtons();
    document.querySelectorAll('.log-item').forEach(el => { el.classList.remove('active'); el.classList.add('done'); });
    LS.save('lastPos', null);
    loadLastPos();
  }
}

function stopAudio() {
  stopFlag = true;
  if (audio) { audio.pause(); audio.src = ''; audio = null; }
  if (resolvePlay) { resolvePlay('stop'); resolvePlay = null; }
}

// ── Button handlers ──
btnPlay.addEventListener('click', () => {
  if (isPaused) {
    isPaused = false;
    if (audio) audio.play();
    showPlayIcon(true);
    document.getElementById('statusDot').style.cssText = 'background:#4edea3; box-shadow: 0 0 8px #4edea3;';
    document.getElementById('statusText').textContent = 'Çalıyor';
    npCard.classList.add('playing-pulse');
    artContainer.classList.add('active-glow');
    eqOverlay.style.opacity = '1';
    return;
  }
  if (isPlaying) {
    isPaused = true;
    if (audio) audio.pause();
    showPlayIcon(false);
    document.getElementById('statusDot').style.cssText = 'background:#fbbf24;';
    document.getElementById('statusText').textContent = 'Durakladı';
    npCard.classList.remove('playing-pulse');
    artContainer.classList.remove('active-glow');
    eqOverlay.style.opacity = '0';
    return;
  }
  const q = buildQueue();
  if (!q.length) return;
  renderLog(); qPos = 0;
  runFrom(0);
});

btnPrev.addEventListener('click', () => { if (!queue.length) return; stopAudio(); isPlaying = false; isPaused = false; const t = Math.max(0, qPos - 1); qPos = t; runFrom(t); });
btnNext.addEventListener('click', () => { if (!queue.length) return; stopAudio(); isPlaying = false; isPaused = false; const t = Math.min(queue.length - 1, qPos + 1); qPos = t; runFrom(t); });
btnFirst.addEventListener('click', () => { if (!queue.length) return; stopAudio(); isPlaying = false; isPaused = false; qPos = 0; runFrom(0); });
btnLast.addEventListener('click', () => { if (!queue.length) return; stopAudio(); isPlaying = false; isPaused = false; const t = queue.length - 1; qPos = t; runFrom(t); });

document.getElementById('btnRebuild').addEventListener('click', () => {
  stopAudio(); isPlaying = false; isPaused = false; showPlayIcon(false);
  buildQueue(); renderLog(); qPos = 0; setIdle('Kuyruk güncellendi'); setNavButtons();
});

function doReset() {
  stopAudio(); isPlaying = false; isPaused = false; queue = []; qPos = 0;
  showPlayIcon(false); setIdle('Bekliyor');
  logBody.innerHTML = '<div class="px-5 py-8 text-center text-sm text-on-surface-dim"><span class="material-symbols-outlined text-white/10 block mb-2" style="font-size:36px">queue_music</span>Kuyruk henüz oluşturulmadı.</div>';
  logCount.textContent = '—';
  document.getElementById('totalDuration').textContent = '—';
  document.getElementById('totalDurHeader').textContent = '—';
  document.getElementById('totalDurNav').textContent = '—';
  [btnFirst, btnPrev, btnNext, btnLast].forEach(b => b.disabled = true);
}

document.getElementById('btnReset').addEventListener('click', doReset);
document.getElementById('btnResetCtrl').addEventListener('click', doReset);

document.getElementById('btnApply').addEventListener('click', () => {
  saveSettings();
  toggleDrawer();
  stopAudio(); isPlaying = false; isPaused = false;
  const q = buildQueue();
  renderLog(); qPos = 0;
  runFrom(0);
});

// ── Init ──
loadSettings();
setNavButtons();
</script>
</body>
</html>
